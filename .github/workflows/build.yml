name: Build ParentLock APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.4-bin.zip -d /opt
          export PATH=/opt/gradle-8.4/bin:$PATH
          gradle --version

      - name: Build APK
        run: |
          export PATH=/opt/gradle-8.4/bin:$PATH
          gradle assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: ParentLock-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
